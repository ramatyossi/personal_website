<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Yossi Nachemi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <a class="site-logo" href="index.html">Yossi Nachemi</a>
    <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('nav').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <nav>
      <a href="work-history.html">Work history</a>
      <a href="projects.html">Projects</a>
      <a href="talks.html">Talks</a>
      <a href="fun-stuff.html">Fun stuff</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <div class="contact-section">
      <div class="contact-inner">
        <h1>Let's chat</h1>
        <p class="contact-subtitle">Questions? Comments? Drop me a line!</p>

        <!--
          To make this form work on your server, set the action to your form handler endpoint.
          Example with PHP: action="contact.php" method="POST"
          Example with Formspree: action="https://formspree.io/f/YOUR_ID" method="POST"
        -->
        <form id="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-row">
            <div class="form-field">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" name="first_name" autocomplete="given-name" />
            </div>
            <div class="form-field">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" name="last_name" autocomplete="family-name" />
            </div>
            <div class="form-field">
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" required autocomplete="email" />
            </div>
          </div>

          <div class="form-field form-message">
            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-send">Send</button>
          </div>

          <p class="form-success" id="form-success">Thanks for reaching out! I'll be in touch soon.</p>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <a class="linkedin-link" href="https://www.linkedin.com/in/yossinachemi" target="_blank" rel="noopener">in</a>
    <p class="copyright">Copyright 2025 Yossi Nachemi</p>
  </footer>

  <script>
    function handleSubmit(e) {
      // If no real action is set, show a success message client-side.
      // Replace this function body with nothing once you wire up a real form handler.
      const form = document.getElementById('contact-form');
      if (!form.action || form.action === window.location.href) {
        e.preventDefault();
        document.getElementById('form-success').style.display = 'block';
        form.reset();
      }
    }
  </script>

</body>
</html>
